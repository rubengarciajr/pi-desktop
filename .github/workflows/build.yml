name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Don't let two tags pushed close together race two publishes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Quality gate — a tag push must not publish a release that fails to
      # type-check, lint, or pass tests.
      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Build, sign & publish DMG
        env:
          # The auto-injected GITHUB_TOKEN has limited scope and leaves releases
          # as drafts. Use the PI_UPDATE_TOKEN PAT (repo scope) instead so
          # electron-builder publishes directly.
          GH_TOKEN: ${{ secrets.PI_UPDATE_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node build/package-dmg.cjs --mac dmg --publish always

name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build, sign & publish DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The afterSign hook handles ad-hoc signing.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npx electron-builder --mac dmg --publish always
          # Strip quarantine from the DMG so it's clean on upload.
          # Browsers re-add it on download, but a clean DMG + ad-hoc signed app
          # changes the error from "damaged" to "unidentified developer" (bypassable).
          DMG_FILE=$(ls dist/*.dmg | head -1)
          if [ -f "$DMG_FILE" ]; then
            xattr -cr "$DMG_FILE"
            codesign --force --sign - "$DMG_FILE"
            echo "Stripped quarantine and signed DMG: $DMG_FILE"
          fi

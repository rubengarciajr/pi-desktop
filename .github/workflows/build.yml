name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build, sign & publish DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc signing: signs the app without a paid Apple Developer cert.
          # Prevents the "DMG is damaged" error on other machines.
          # Users approve via System Settings > Privacy & Security on first launch.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          # Build the app without signing first, then ad-hoc sign, then create DMG.
          npx electron-builder --mac dir --publish never
          APP_PATH="dist/mac-arm64/Pi Desktop.app"
          codesign --force --deep --sign - "$APP_PATH"
          npx electron-builder --mac dmg --publish always

name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Don't let two tags pushed close together race two publishes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Quality gate — a tag push must not publish a release that fails to
      # type-check, lint, or pass tests.
      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Build, sign & publish DMG
        env:
          # The auto-injected GITHUB_TOKEN has sufficient scope to publish
          # releases on a public repo (the workflow grants contents: write).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node build/package-dmg.cjs --mac dmg --publish always

      # electron-builder sometimes leaves the release as a draft even with
      # --publish always. This step flips any draft for the current tag to
      # published so /releases/latest sees it immediately.
      - name: Publish release (if still draft)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest || true
